name: CI / Deploy

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:

  deploy:
    name: Deploy to Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # DEBUG STEP (SAFE)
      # =========================
      - name: Debug secrets (NO VALUES EXPOSED)
        run: |
          echo "Checking required secrets..."

          if [ -z "${{ vars.DEPLOY_USER }}" ]; then
            echo "❌ DEPLOY_USER is EMPTY or MISSING"
            exit 1
          else
            echo "✅ DEPLOY_USER is set"
          fi

          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "❌ DEPLOY_HOST is EMPTY or MISSING"
            exit 1
          else
            echo "✅ DEPLOY_HOST is set"
          fi

          

          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "❌ DEPLOY_SSH_KEY is EMPTY or MISSING"
            exit 1
          else
            echo "✅ DEPLOY_SSH_KEY is set"
          fi

          if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "❌ DEPLOY_PATH is EMPTY or MISSING"
            exit 1
          else
            echo "✅ DEPLOY_PATH is set"
          fi

      # =========================
      # SSH DEPLOY STEP
      # =========================
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd ${{ secrets.DEPLOY_PATH }}

            echo "── Pulling latest code ──"
            git pull origin master

            echo "── Installing PHP dependencies ──"
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            echo "── Installing JS dependencies ──"
            npm ci --omit=dev

            echo "── Building frontend assets ──"
            npm run build

            echo "── Running migrations ──"
            php artisan migrate --force

            echo "── Caching config / routes / views ──"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "── Restarting queue workers ──"
            php artisan queue:restart

            echo "── Reloading PHP-FPM ──"
            sudo systemctl reload php8.3-fpm

            echo "── Deploy complete ──"
